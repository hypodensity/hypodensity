repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: uv run ruff check .
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        types: [python]

      - id: typecheck
        name: mypy
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
